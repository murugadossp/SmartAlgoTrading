# Global app config (non-secret). Secrets (API keys, broker tokens) stay in .env.

broker:
  provider: dhan
  # Optional per-provider options (no credentials here)
  # dhan:
  #   request_timeout: 30
  #   rate_limit_per_sec: 5

# Agent defaults: provider, model, temperature, max_tokens. Also used as app-level LLM default (Settings fallback).
# Per-agent config.yaml overrides these. API keys in .env (OPENAI_API_KEY, ANTHROPIC_API_KEY).
agents:
  default:
    provider: openai   # openai | anthropic; each agent can override in its own config.yaml
    model: "gpt-5-mini"
    temperature: 0.2
    max_tokens: 128000
